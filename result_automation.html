<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>퀴즈 마을 — 결과 대시보드</title>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --c1:#ff6b6b; --c2:#feca57; --c3:#48dbfb; --c4:#ff9ff3;
      --c5:#54a0ff; --c6:#5f27cd;
      --dark:#1a1a2e; --card:rgba(255,255,255,0.10);
      --radius:16px; --shadow:0 8px 32px rgba(0,0,0,0.35);
    }
    body {
      font-family:'Noto Sans KR',sans-serif;
      background:linear-gradient(135deg,#2e2e52 0%,#263263 25%,#1e5496 50%,#6a42aa 75%,#2e2e52 100%);
      background-size:400% 400%; animation:bgShift 12s ease infinite;
      min-height:100vh; color:#fff; padding:24px 16px;
    }
    @keyframes bgShift {
      0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
    }
    .header { text-align:center; margin-bottom:32px; }
    .header h1 {
      font-family:'Jua',cursive; font-size:clamp(1.8rem,5vw,3rem);
      background:linear-gradient(90deg,var(--c2),var(--c1),var(--c4),var(--c3));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      filter:drop-shadow(0 0 16px rgba(255,202,87,.4));
    }
    .header p { color:rgba(255,255,255,.55); margin-top:6px; font-size:.9rem; }
    .card {
      background:var(--card); backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.15); border-radius:var(--radius);
      padding:24px; box-shadow:var(--shadow); margin-bottom:24px;
    }
    .section-title { font-family:'Jua',cursive; font-size:1.2rem; margin-bottom:16px; color:var(--c2); }
    .summary-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:24px; }
    .summary-card {
      background:var(--card); backdrop-filter:blur(16px);
      border:1px solid rgba(255,255,255,.15); border-radius:var(--radius);
      padding:20px; text-align:center; box-shadow:var(--shadow);
    }
    .summary-card .val { font-family:'Jua',cursive; font-size:2rem; color:var(--c2); }
    .summary-card .lbl { font-size:.8rem; color:rgba(255,255,255,.55); margin-top:4px; }
    .tabs { display:flex; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
    .tab-btn {
      padding:8px 18px; border:1.5px solid rgba(255,255,255,.2); border-radius:50px;
      background:transparent; color:rgba(255,255,255,.6); cursor:pointer;
      font-family:'Noto Sans KR',sans-serif; font-size:.9rem; transition:all .2s;
    }
    .tab-btn.active {
      background:linear-gradient(135deg,var(--c5),var(--c6));
      border-color:transparent; color:#fff;
    }
    .session-table, .history-table { width:100%; border-collapse:collapse; }
    .session-table th, .history-table th {
      text-align:left; padding:8px 12px; font-size:.8rem;
      color:rgba(255,255,255,.5); border-bottom:1px solid rgba(255,255,255,.1);
    }
    .session-table td { padding:10px 12px; font-size:.9rem; border-bottom:1px solid rgba(255,255,255,.07); }
    .history-table td { padding:8px 10px; font-size:.85rem; border-bottom:1px solid rgba(255,255,255,.06); }
    .session-table tr:hover td { background:rgba(255,255,255,.05); cursor:pointer; }
    .badge { display:inline-block; padding:2px 10px; border-radius:50px; font-size:.75rem; font-weight:700; }
    .badge-sang { background:linear-gradient(135deg,var(--c1),#ee5a24); }
    .badge-ha   { background:linear-gradient(135deg,var(--c3),#0097a7); color:#1a1a2e; }
    #session-detail { display:none; }
    .rank-list { list-style:none; }
    .rank-list li {
      display:flex; align-items:center; gap:12px;
      padding:8px 12px; border-radius:10px; margin-bottom:6px;
      background:rgba(255,255,255,.06);
    }
    .rank-num  { font-family:'Jua',cursive; font-size:1.1rem; width:32px; text-align:center; }
    .rank-name { flex:1; }
    .rank-score{ color:var(--c2); font-weight:700; }
    .search-box { display:flex; gap:10px; margin-bottom:16px; }
    .search-box input {
      flex:1; background:rgba(255,255,255,.12); border:1.5px solid rgba(255,255,255,.25);
      border-radius:12px; padding:10px 16px; color:#fff;
      font-size:1rem; font-family:'Noto Sans KR',sans-serif; outline:none;
    }
    .search-box input::placeholder { color:rgba(255,255,255,.4); }
    .search-box input:focus { border-color:var(--c3); }
    .search-box button {
      padding:10px 20px; border:none; border-radius:12px;
      background:linear-gradient(135deg,var(--c5),var(--c6));
      color:#fff; font-family:'Jua',cursive; font-size:1rem; cursor:pointer;
    }
    .bar-row { margin-bottom:14px; }
    .bar-label { display:flex; justify-content:space-between; font-size:.85rem; margin-bottom:5px; }
    .bar-track { background:rgba(255,255,255,.1); border-radius:50px; height:14px; overflow:hidden; }
    .bar-fill {
      height:100%; border-radius:50px;
      background:linear-gradient(90deg,var(--c5),var(--c3));
      transition:width .6s ease;
    }
    .empty { text-align:center; color:rgba(255,255,255,.4); padding:32px 0; font-size:.95rem; }
    .spinner {
      display:inline-block; width:24px; height:24px;
      border:3px solid rgba(255,255,255,.2); border-top-color:var(--c3);
      border-radius:50%; animation:spin .7s linear infinite;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading { text-align:center; padding:32px; }
    #error-banner {
      display:none; background:rgba(255,107,107,.2); border:1px solid var(--c1);
      border-radius:12px; padding:12px 16px; margin-bottom:20px;
      font-size:.9rem; color:#ffcccc;
    }
    @media(max-width:600px) {
      .summary-grid { grid-template-columns:1fr 1fr; }
      .summary-grid .summary-card:last-child { grid-column:span 2; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>🏆 퀴즈 마을 — 결과 대시보드</h1>
    <p id="conn-status">연결 중...</p>
  </div>

  <div id="error-banner"></div>

  <!-- 요약 카드 -->
  <div class="summary-grid">
    <div class="summary-card">
      <div class="val" id="sum-sessions">—</div>
      <div class="lbl">총 세션</div>
    </div>
    <div class="summary-card">
      <div class="val" id="sum-players">—</div>
      <div class="lbl">총 참가자</div>
    </div>
    <div class="summary-card">
      <div class="val" id="sum-avg">—</div>
      <div class="lbl">전체 평균 점수</div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('sessions')">📋 세션 목록</button>
    <button class="tab-btn" onclick="showTab('search')">👤 참가자 검색</button>
    <button class="tab-btn" onclick="showTab('stats')">📊 주제별 통계</button>
  </div>

  <!-- 세션 목록 -->
  <div id="tab-sessions">
    <div class="card">
      <div class="section-title">📋 세션 목록</div>
      <div id="sessions-loading" class="loading"><span class="spinner"></span></div>
      <table class="session-table" id="sessions-table" style="display:none">
        <thead>
          <tr>
            <th>날짜·시간</th><th>주제</th><th>난이도</th><th>문제 수</th><th>참가자</th>
          </tr>
        </thead>
        <tbody id="sessions-body"></tbody>
      </table>
      <div id="sessions-empty" class="empty" style="display:none">저장된 세션이 없습니다.</div>
    </div>
    <div class="card" id="session-detail">
      <div class="section-title" id="detail-title">세션 상세</div>
      <ul class="rank-list" id="detail-list"></ul>
    </div>
  </div>

  <!-- 참가자 검색 -->
  <div id="tab-search" style="display:none">
    <div class="card">
      <div class="section-title">👤 참가자 점수 이력</div>
      <div class="search-box">
        <input type="text" id="search-input" placeholder="참가자 이름 입력..." />
        <button onclick="searchPlayer()">검색</button>
      </div>
      <div id="search-loading" style="display:none" class="loading"><span class="spinner"></span></div>
      <table class="history-table" id="search-table" style="display:none">
        <thead>
          <tr><th>날짜</th><th>주제</th><th>난이도</th><th>점수</th><th>등수</th></tr>
        </thead>
        <tbody id="search-body"></tbody>
      </table>
      <div id="search-empty" class="empty" style="display:none">검색 결과가 없습니다.</div>
    </div>
  </div>

  <!-- 주제별 통계 -->
  <div id="tab-stats" style="display:none">
    <div class="card">
      <div class="section-title">📊 주제별 평균 점수</div>
      <div id="stats-loading" class="loading"><span class="spinner"></span></div>
      <div id="stats-bars"></div>
      <div id="stats-empty" class="empty" style="display:none">데이터가 없습니다.</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://gsmgoklacmnxkckvwerb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzbWdva2xhY21ueGtja3Z3ZXJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDU1NjcsImV4cCI6MjA5MDMyMTU2N30.wKBny8Wh9zaz8BT0-ZrXaAx0WPynlN5H3dRxm-JauDw';

    let sb;
    let statsLoaded = false;

    function showError(msg) {
      const el = document.getElementById('error-banner');
      el.textContent = '⚠️ ' + msg;
      el.style.display = 'block';
    }
    function esc(s) {
      return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('ko-KR') + ' ' +
             d.toLocaleTimeString('ko-KR', { hour:'2-digit', minute:'2-digit' });
    }

    /* ── 탭 전환 ── */
    function showTab(name) {
      ['sessions','search','stats'].forEach(t => {
        document.getElementById('tab-' + t).style.display = t === name ? '' : 'none';
      });
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', ['sessions','search','stats'][i] === name);
      });
      if (name === 'stats') loadStats();
    }

    /* ── 요약 카드 ── */
    async function loadSummary() {
      const [sessRes, resRes] = await Promise.all([
        sb.from('quiz_sessions').select('*', { count:'exact', head:true }),
        sb.from('quiz_results').select('score')
      ]);
      document.getElementById('sum-sessions').textContent = (sessRes.count || 0) + '회';
      const results = resRes.data || [];
      document.getElementById('sum-players').textContent = results.length + '명';
      if (results.length > 0) {
        const avg = Math.round(results.reduce((s, r) => s + r.score, 0) / results.length);
        document.getElementById('sum-avg').textContent = avg.toLocaleString() + '점';
      } else {
        document.getElementById('sum-avg').textContent = '—';
      }
    }

    /* ── 세션 목록 ── */
    async function loadSessions() {
      const { data, error } = await sb
        .from('quiz_sessions')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(50);

      document.getElementById('sessions-loading').style.display = 'none';
      if (error) { showError('세션 조회 실패: ' + error.message); return; }
      if (!data || data.length === 0) {
        document.getElementById('sessions-empty').style.display = '';
        return;
      }

      const tbody = document.getElementById('sessions-body');
      tbody.innerHTML = data.map(s => `
        <tr onclick="loadDetail('${s.id}','${esc(s.topic)}','${esc(s.difficulty)}','${esc(fmtDate(s.created_at))}')">
          <td>${fmtDate(s.created_at)}</td>
          <td>${esc(s.topic || '—')}</td>
          <td><span class="badge badge-${s.difficulty === '상' ? 'sang' : 'ha'}">${esc(s.difficulty || '—')}</span></td>
          <td>${s.total_q}문제</td>
          <td>${s.player_count}명</td>
        </tr>
      `).join('');
      document.getElementById('sessions-table').style.display = '';
    }

    /* ── 세션 상세 ── */
    async function loadDetail(sessionId, topic, diff, dateStr) {
      const detail = document.getElementById('session-detail');
      detail.style.display = '';
      document.getElementById('detail-title').textContent = `📌 ${dateStr} · ${topic} (${diff})`;
      document.getElementById('detail-list').innerHTML = '<li><span class="spinner"></span></li>';

      const { data, error } = await sb
        .from('quiz_results')
        .select('player_name, score, rank')
        .eq('session_id', sessionId)
        .order('rank', { ascending: true });

      if (error || !data) {
        document.getElementById('detail-list').innerHTML = '<li style="color:rgba(255,255,255,.4)">데이터 없음</li>';
        return;
      }
      const medals = ['🥇','🥈','🥉'];
      document.getElementById('detail-list').innerHTML = data.map(r => `
        <li>
          <span class="rank-num">${medals[r.rank - 1] || r.rank + '위'}</span>
          <span class="rank-name">${esc(r.player_name)}</span>
          <span class="rank-score">${r.score.toLocaleString()}점</span>
        </li>
      `).join('');
      detail.scrollIntoView({ behavior:'smooth', block:'start' });
    }

    /* ── 참가자 검색 ── */
    async function searchPlayer() {
      const name = document.getElementById('search-input').value.trim();
      if (!name) return;

      document.getElementById('search-loading').style.display = '';
      document.getElementById('search-table').style.display   = 'none';
      document.getElementById('search-empty').style.display   = 'none';

      const { data, error } = await sb
        .from('quiz_results')
        .select('score, rank, created_at, quiz_sessions(topic, difficulty, created_at)')
        .eq('player_name', name)
        .order('created_at', { ascending: false })
        .limit(30);

      document.getElementById('search-loading').style.display = 'none';
      if (error) { showError('검색 실패: ' + error.message); return; }
      if (!data || data.length === 0) {
        document.getElementById('search-empty').style.display = '';
        return;
      }
      const tbody = document.getElementById('search-body');
      tbody.innerHTML = data.map(r => {
        const sess = r.quiz_sessions || {};
        return `<tr>
          <td>${fmtDate(sess.created_at || r.created_at)}</td>
          <td>${esc(sess.topic || '—')}</td>
          <td><span class="badge badge-${sess.difficulty === '상' ? 'sang' : 'ha'}">${esc(sess.difficulty || '—')}</span></td>
          <td>${r.score.toLocaleString()}점</td>
          <td>${r.rank}위</td>
        </tr>`;
      }).join('');
      document.getElementById('search-table').style.display = '';
    }

    document.getElementById('search-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchPlayer();
    });

    /* ── 주제별 통계 ── */
    async function loadStats() {
      if (statsLoaded) return;
      statsLoaded = true;

      const { data, error } = await sb
        .from('quiz_results')
        .select('score, quiz_sessions(topic)');

      document.getElementById('stats-loading').style.display = 'none';
      if (error || !data || data.length === 0) {
        document.getElementById('stats-empty').style.display = '';
        return;
      }

      const map = {};
      data.forEach(r => {
        const topic = r.quiz_sessions?.topic || '기타';
        if (!map[topic]) map[topic] = { total: 0, count: 0 };
        map[topic].total += r.score;
        map[topic].count++;
      });

      const entries = Object.entries(map)
        .map(([t, v]) => ({ topic: t, avg: Math.round(v.total / v.count), count: v.count }))
        .sort((a, b) => b.avg - a.avg);

      const maxAvg = entries[0]?.avg || 1;
      document.getElementById('stats-bars').innerHTML = entries.map(e => `
        <div class="bar-row">
          <div class="bar-label">
            <span>${esc(e.topic)}</span>
            <span>${e.avg.toLocaleString()}점 · ${e.count}명</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(e.avg / maxAvg * 100)}%"></div>
          </div>
        </div>
      `).join('');
    }

    /* ── 초기화 ── */
    async function init() {
      try {
        sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        document.getElementById('conn-status').textContent = '연결됨';
        await Promise.all([loadSummary(), loadSessions()]);
      } catch(e) {
        document.getElementById('conn-status').textContent = '연결 실패';
        showError('초기화 오류: ' + e.message);
      }
    }
    init();
  </script>
</body>
</html>
